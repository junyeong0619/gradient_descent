name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pyinstaller

      - name: Build executable
        run: pyinstaller --clean build_windows.spec

      - name: Stage release files
        run: |
          mkdir release
          copy dist\GD_Simulator.exe release\
          copy data_convex.csv release\
          copy data_nonconvex.csv release\
          copy REPORT.md release\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GD_Simulator-windows
          path: release/
          if-no-files-found: error

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GD_Simulator.exe
            data_convex.csv
            data_nonconvex.csv
          generate_release_notes: true
